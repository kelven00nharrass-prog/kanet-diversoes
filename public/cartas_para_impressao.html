<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ka'Net diversões — Impressão de Cartas Frente e Verso</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-blue: #00d2ff;
      --color-yellow: #ffcc00;
      --color-dark-bg: #0d1326;
      --color-dark-card: #080d1a;
      --font-primary: 'Outfit', sans-serif;
      --font-display: 'Space Grotesk', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* FORÇAR A IMPRESSÃO DE CORES E IMAGENS DE FUNDO NO NAVEGADOR */
    body, 
    .page-a4, 
    .printable-card, 
    .card-content, 
    .word-item,
    .card-header,
    .card-watermark {
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
    }

    body {
      font-family: var(--font-primary);
      background-color: #030712;
      color: #f3f4f6;
      padding: 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Painel de Controlo (escondido na impressão) */
    .control-panel {
      background: rgba(17, 24, 39, 0.95);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 24px;
      border-radius: 16px;
      width: 100%;
      max-width: 820px;
      margin-bottom: 40px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .panel-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 20px;
    }

    .panel-title {
      font-family: var(--font-display);
      font-size: 1.6rem;
      color: var(--color-blue);
      text-shadow: 0 0 10px rgba(0, 210, 255, 0.2);
    }

    .form-group {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    label {
      font-size: 0.95rem;
      color: #9ca3af;
      font-weight: 600;
    }

    select, button {
      font-family: var(--font-primary);
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: #fff;
      padding: 10px 16px;
      border-radius: 10px;
      font-size: 0.95rem;
      outline: none;
      transition: all 0.2s ease;
      cursor: pointer;
    }

    select:focus, button:hover {
      border-color: var(--color-blue);
      background: rgba(255, 255, 255, 0.1);
    }

    .btn-print {
      background: linear-gradient(135deg, #00d2ff 0%, #0066ff 100%);
      border: none;
      font-weight: 700;
      box-shadow: 0 4px 15px rgba(0, 210, 255, 0.35);
    }

    .btn-print:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 210, 255, 0.5);
    }

    /* Container de Páginas */
    .print-pages-container {
      display: flex;
      flex-direction: column;
      gap: 40px;
      align-items: center;
      width: 100%;
    }

    /* Página A4 (Dimensões Exatas de Impressão) */
    .page-a4 {
      width: 210mm;
      height: 297mm;
      background-color: #ffffff;
      color: #000;
      padding: 16.5mm 12mm; /* Centraliza a grelha de 3x3 perfeitamente na página */
      box-sizing: border-box;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
      position: relative;
      display: grid;
      grid-template-columns: repeat(3, 62mm);
      grid-template-rows: repeat(3, 88mm);
      gap: 0;
      justify-content: center;
      align-content: center;
    }

    .page-a4-label {
      position: absolute;
      top: 5mm;
      left: 12mm;
      font-size: 10px;
      color: #888;
      font-family: monospace;
    }

    /* Estilo Base da Carta */
    .printable-card {
      width: 62mm;
      height: 88mm;
      border: 1px dotted rgba(0, 0, 0, 0.12); /* Linha de corte */
      box-sizing: border-box;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* CONTEÚDO DA CARTA (LADO AZUL OU AMARELO) */
    .card-content {
      display: flex;
      flex-direction: column;
      height: 100%;
      padding: 6mm 5mm;
      justify-content: space-between;
      position: relative;
      z-index: 1;
    }

    /* Watermark de Fundo (Logo da Ka'Net) */
    .card-watermark {
      position: absolute;
      top: 52%;
      left: 50%;
      width: 44mm;
      height: 44mm;
      transform: translate(-50%, -50%);
      background-image: url('logo.png');
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      opacity: 0.06; /* Suave para permitir leitura perfeita */
      z-index: -1;
      pointer-events: none;
    }

    .premium-mode .card-watermark {
      opacity: 0.04; /* Ajuste para o fundo escuro */
      filter: brightness(1.2);
    }

    /* Cabeçalho da Carta */
    .card-header {
      border-bottom: 2px solid #1f2937;
      padding-bottom: 2mm;
      margin-bottom: 3.5mm;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo-text {
      font-family: var(--font-display);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 1.5px;
    }

    .card-id {
      font-family: monospace;
      font-size: 10px;
      font-weight: bold;
    }

    /* Lista de Palavras */
    .words-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 1.8mm;
      flex: 1;
      justify-content: center;
    }

    .word-item {
      font-size: 11.5px;
      font-weight: 700;
      padding: 2.4mm 3mm;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center; /* Centrar texto horizontalmente nas cartas sem números */
      text-align: center;
      line-height: 1.2;
    }

    /* =====================================================
       CORES LADO AZUL (FRENTE) - MODO ECONÓMICO
       ===================================================== */
    .theme-blue-light {
      background-color: #ffffff;
    }
    .theme-blue-light .logo-text { color: #0284c7; }
    .theme-blue-light .card-header { border-bottom-color: #0284c7; }
    .theme-blue-light .card-id { color: #6b7280; }
    .theme-blue-light .word-item {
      background: #f0f9ff;
      color: #0369a1;
      border-left: 3.5px solid #0284c7;
    }

    /* =====================================================
       CORES LADO AMARELO (VERSO) - MODO ECONÓMICO
       ===================================================== */
    .theme-yellow-light {
      background-color: #ffffff;
    }
    .theme-yellow-light .logo-text { color: #b45309; }
    .theme-yellow-light .card-header { border-bottom-color: #b45309; }
    .theme-yellow-light .card-id { color: #6b7280; }
    .theme-yellow-light .word-item {
      background: #fffbeb;
      color: #78350f;
      border-left: 3.5px solid #d97706;
    }

    /* =====================================================
       CORES LADO AZUL (FRENTE) - MODO PREMIUM (ESCURECIDO)
       ===================================================== */
    .premium-mode .theme-blue-premium {
      background-color: var(--color-dark-card);
    }
    .premium-mode .theme-blue-premium .card-content {
      background: radial-gradient(circle at top right, #0d223f 0%, #030712 100%);
    }
    .premium-mode .theme-blue-premium .logo-text { color: var(--color-blue); }
    .premium-mode .theme-blue-premium .card-header { border-bottom-color: var(--color-blue); }
    .premium-mode .theme-blue-premium .card-id { color: var(--color-blue); }
    .premium-mode .theme-blue-premium .word-item {
      background: rgba(0, 210, 255, 0.04);
      color: #e0f2fe;
      border: 1px solid rgba(0, 210, 255, 0.08);
      border-left: 4px solid var(--color-blue);
      box-shadow: 0 0 8px rgba(0, 210, 255, 0.08);
    }

    /* =====================================================
       CORES LADO AMARELO (VERSO) - MODO PREMIUM (ESCURECIDO)
       ===================================================== */
    .premium-mode .theme-yellow-premium {
      background-color: var(--color-dark-card);
    }
    .premium-mode .theme-yellow-premium .card-content {
      background: radial-gradient(circle at top right, #332b00 0%, #030712 100%);
    }
    .premium-mode .theme-yellow-premium .logo-text { color: var(--color-yellow); }
    .premium-mode .theme-yellow-premium .card-header { border-bottom-color: var(--color-yellow); }
    .premium-mode .theme-yellow-premium .card-id { color: var(--color-yellow); }
    .premium-mode .theme-yellow-premium .word-item {
      background: rgba(255, 204, 0, 0.03);
      color: #fef3c7;
      border: 1px solid rgba(255, 204, 0, 0.06);
      border-left: 4px solid var(--color-yellow);
      box-shadow: 0 0 8px rgba(255, 204, 0, 0.06);
    }


    /* =====================================================
       IMPRESSÃO DE PÁGINAS (CONFIGURAÇÕES DO SISTEMA)
       ===================================================== */
    @media print {
      body {
        background-color: #ffffff !important;
        color: #000000 !important;
        padding: 0 !important;
        margin: 0 !important;
      }
      .no-print {
        display: none !important;
      }
      .page-a4 {
        box-shadow: none !important;
        page-break-after: always !important;
        margin: 0 !important;
      }
      .page-a4-label {
        display: none !important;
      }
    }
  </style>
</head>
<body>

  <!-- Painel de Controlo -->
  <div class="control-panel no-print">
    <div class="panel-row">
      <div class="panel-title">🎴 Impressão de Cartas Ka'Net (Dupla Face)</div>
      <button class="btn-print" onclick="window.print()">🖨️ Imprimir / Guardar em PDF</button>
    </div>
    <div class="panel-row">
      <div class="form-group">
        <label for="select-range">Intervalo de Cartas (285 Cartas Totais):</label>
        <select id="select-range" onchange="loadCards()">
          <option value="1-27">Cartas 1 a 27 (6 páginas A4: 3 Frente + 3 Verso)</option>
          <option value="28-54">Cartas 28 a 54 (6 páginas A4)</option>
          <option value="55-108">Cartas 55 a 108 (12 páginas A4)</option>
          <option value="109-162">Cartas 109 a 162 (12 páginas A4)</option>
          <option value="163-216">Cartas 163 a 216 (12 páginas A4)</option>
          <option value="217-285">Cartas 217 a 285 (16 páginas A4)</option>
        </select>
      </div>

      <div class="form-group">
        <label for="select-style">Estilo Visual das Cartas:</label>
        <select id="select-style" onchange="toggleStyle()">
          <option value="premium">✨ Premium (Fundo Escuro Original)</option>
          <option value="light">🏠 Económico (Fundo Branco - Poupa Tinta)</option>
        </select>
      </div>
    </div>
    <div style="font-size: 11.5px; color: #9ca3af; line-height: 1.5; border-top: 1px solid rgba(255,255,255,0.08); padding-top: 12px;">
      💡 <strong>Novidades nesta versão:</strong> As enumerações de palavras (1. 2. 3...) foram removidas e adicionámos a marca de água oficial da <strong>Ka'Net</strong> no fundo de cada carta.
    </div>
  </div>

  <!-- Contentor das Páginas A4 -->
  <div class="print-pages-container premium-mode" id="pages-container">
    <p>A carregar base de dados de palavras...</p>
  </div>

  <script>
    let allCards = [];

    // Carregar o words.json
    fetch('words.json')
      .then(res => res.json())
      .then(data => {
        allCards = data;
        loadCards();
      })
      .catch(err => {
        console.error("Erro ao carregar words.json:", err);
        document.getElementById('pages-container').innerHTML = "<p style='color:red;'>Erro ao carregar o ficheiro words.json. Certifique-se de que está a correr no servidor.</p>";
      });

    function toggleStyle() {
      const style = document.getElementById('select-style').value;
      const container = document.getElementById('pages-container');
      if (style === 'premium') {
        container.classList.add('premium-mode');
      } else {
        container.classList.remove('premium-mode');
      }
    }

    function loadCards() {
      const range = document.getElementById('select-range').value;
      const parts = range.split('-');
      const startCard = parseInt(parts[0]);
      const endCard = parseInt(parts[1]);

      const startIdx = (startCard - 1) * 2;
      const endIdx = (endCard * 2) - 1;

      const selectedWords = allCards.slice(startIdx, endIdx + 1);
      renderDoubleSidedLayout(selectedWords, startCard);
    }

    function renderDoubleSidedLayout(wordsArray, startCardId) {
      const container = document.getElementById('pages-container');
      container.innerHTML = '';

      const cardsPerPage = 9;
      const totalPhysicalCards = Math.ceil(wordsArray.length / 2);
      const pagesCount = Math.ceil(totalPhysicalCards / cardsPerPage);

      for (let p = 0; p < pagesCount; p++) {
        const pagePhysicalCards = [];
        for (let i = 0; i < cardsPerPage; i++) {
          const idx = (p * cardsPerPage + i) * 2;
          if (idx < wordsArray.length) {
            pagePhysicalCards.push({
              id: startCardId + (p * cardsPerPage) + i,
              blueSide: wordsArray[idx],
              yellowSide: wordsArray[idx + 1]
            });
          }
        }

        // =====================================================
        // 1. PÁGINA DE FRENTES (LADO AZUL)
        // =====================================================
        const frontPage = document.createElement('div');
        frontPage.className = 'page-a4';
        
        const labelF = document.createElement('div');
        labelF.className = 'page-a4-label';
        labelF.innerText = `PÁGINA A4 - LADO AZUL (Frentes) - Cartas ${pagePhysicalCards[0].id} a ${pagePhysicalCards[pagePhysicalCards.length-1].id}`;
        frontPage.appendChild(labelF);

        pagePhysicalCards.forEach((card) => {
          const cardEl = document.createElement('div');
          cardEl.className = 'printable-card theme-blue-light theme-blue-premium card-front-theme';
          
          let wordsHtml = '';
          card.blueSide.words.forEach((word) => {
            // Sem números à frente, centralizado
            wordsHtml += `<li class="word-item">${word}</li>`;
          });

          cardEl.innerHTML = `
            <div class="card-content">
              <div class="card-watermark"></div>
              <div class="card-header">
                <span class="logo-text">KA'NET</span>
                <span class="card-id">#${card.id}A</span>
              </div>
              <ul class="words-list">
                ${wordsHtml}
              </ul>
            </div>
          `;
          frontPage.appendChild(cardEl);
        });

        // Placeholder se menos de 9
        for (let i = pagePhysicalCards.length; i < cardsPerPage; i++) {
          const empty = document.createElement('div');
          empty.className = 'printable-card';
          empty.style.border = '1px dashed #e5e7eb';
          frontPage.appendChild(empty);
        }
        container.appendChild(frontPage);


        // =====================================================
        // 2. PÁGINA DE VERSOS (LADO AMARELO) - ESPELHADA
        // =====================================================
        const backPage = document.createElement('div');
        backPage.className = 'page-a4';
        
        const labelB = document.createElement('div');
        labelB.className = 'page-a4-label';
        labelB.innerText = `PÁGINA A4 - LADO AMARELO (Versos) - Cartas correspondentes`;
        backPage.appendChild(labelB);

        const mirroredCards = [];
        for (let row = 0; row < 3; row++) {
          const rowStart = row * 3;
          const card1 = pagePhysicalCards[rowStart + 2];
          const card2 = pagePhysicalCards[rowStart + 1];
          const card3 = pagePhysicalCards[rowStart + 0];
          
          mirroredCards.push(card1);
          mirroredCards.push(card2);
          mirroredCards.push(card3);
        }

        mirroredCards.forEach((card) => {
          const cardEl = document.createElement('div');
          cardEl.className = 'printable-card theme-yellow-light theme-yellow-premium card-front-theme';
          
          if (card && card.yellowSide) {
            let wordsHtml = '';
            card.yellowSide.words.forEach((word) => {
              // Sem números à frente, centralizado
              wordsHtml += `<li class="word-item">${word}</li>`;
            });

            cardEl.innerHTML = `
              <div class="card-content">
                <div class="card-watermark"></div>
                <div class="card-header">
                  <span class="logo-text">KA'NET</span>
                  <span class="card-id">#${card.id}B</span>
                </div>
                <ul class="words-list">
                  ${wordsHtml}
                </ul>
              </div>
            `;
          } else {
            cardEl.style.border = '1px dashed #e5e7eb';
          }
          backPage.appendChild(cardEl);
        });

        container.appendChild(backPage);
      }
      
      toggleStyle();
    }
  </script>
</body>
</html>
