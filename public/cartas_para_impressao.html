<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ka'Net diversões — Impressão de Cartas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-blue: #00d2ff;
      --color-yellow: #ffcc00;
      --color-dark-bg: #0d1326;
      --color-dark-card: #080d1a;
      --font-primary: 'Outfit', sans-serif;
      --font-display: 'Space Grotesk', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* FORÇAR A IMPRESSÃO DE CORES E IMAGENS DE FUNDO NO NAVEGADOR */
    body, 
    .page-a4, 
    .printable-card, 
    .card-front, 
    .card-back, 
    .back-pattern, 
    .word-item,
    .card-header,
    .word-num {
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
    }

    body {
      font-family: var(--font-primary);
      background-color: #030712;
      color: #f3f4f6;
      padding: 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Painel de Controlo (escondido na impressão) */
    .control-panel {
      background: rgba(17, 24, 39, 0.95);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 24px;
      border-radius: 16px;
      width: 100%;
      max-width: 820px;
      margin-bottom: 40px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .panel-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 20px;
    }

    .panel-title {
      font-family: var(--font-display);
      font-size: 1.6rem;
      color: var(--color-blue);
      text-shadow: 0 0 10px rgba(0, 210, 255, 0.2);
    }

    .form-group {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    label {
      font-size: 0.95rem;
      color: #9ca3af;
      font-weight: 600;
    }

    select, button {
      font-family: var(--font-primary);
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: #fff;
      padding: 10px 16px;
      border-radius: 10px;
      font-size: 0.95rem;
      outline: none;
      transition: all 0.2s ease;
      cursor: pointer;
    }

    select:focus, button:hover {
      border-color: var(--color-blue);
      background: rgba(255, 255, 255, 0.1);
    }

    .btn-print {
      background: linear-gradient(135deg, #00d2ff 0%, #0066ff 100%);
      border: none;
      font-weight: 700;
      box-shadow: 0 4px 15px rgba(0, 210, 255, 0.35);
    }

    .btn-print:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 210, 255, 0.5);
    }

    /* Container de Páginas */
    .print-pages-container {
      display: flex;
      flex-direction: column;
      gap: 40px;
      align-items: center;
      width: 100%;
    }

    /* Página A4 (Dimensões Exatas de Impressão) */
    .page-a4 {
      width: 210mm;
      height: 297mm;
      background-color: #ffffff;
      color: #000;
      padding: 16.5mm 12mm; /* Centraliza a grelha de 3x3 perfeitamente na página */
      box-sizing: border-box;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
      position: relative;
      display: grid;
      grid-template-columns: repeat(3, 62mm);
      grid-template-rows: repeat(3, 88mm);
      gap: 0;
      justify-content: center;
      align-content: center;
    }

    .page-a4-label {
      position: absolute;
      top: 5mm;
      left: 12mm;
      font-size: 10px;
      color: #888;
      font-family: monospace;
    }

    /* Estilo Base da Carta */
    .printable-card {
      width: 62mm;
      height: 88mm;
      border: 1px dotted rgba(0, 0, 0, 0.15); /* Linha de corte */
      box-sizing: border-box;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background-color: #ffffff;
    }

    /* =====================================================
       FRENTE DA CARTA: MODO ECONÓMICO (PADRÃO)
       ===================================================== */
    .card-front {
      display: flex;
      flex-direction: column;
      height: 100%;
      padding: 6mm 5mm;
      justify-content: space-between;
      background-color: #ffffff;
    }

    .card-header {
      border-bottom: 2px solid #1f2937;
      padding-bottom: 2mm;
      margin-bottom: 3mm;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo-text {
      font-family: var(--font-display);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 1px;
      color: #111827;
    }

    .card-id {
      font-family: monospace;
      font-size: 10px;
      color: #4b5563;
      font-weight: bold;
    }

    .words-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 2mm;
      flex: 1;
      justify-content: center;
    }

    .word-item {
      font-size: 11.5px;
      font-weight: 700;
      color: #1f2937;
      padding: 2.2mm 3mm;
      border-radius: 6px;
      background: #f3f4f6; /* Fundo suave */
      border-left: 4px solid #9ca3af; /* Borda lateral padrão */
      display: flex;
      align-items: center;
    }

    /* Cores Alternadas dos Itens no Modo Económico */
    .word-item.border-blue {
      border-left-color: #0284c7;
    }
    .word-item.border-yellow {
      border-left-color: #d97706;
    }

    .word-num {
      font-weight: 800;
      margin-right: 2.5mm;
      opacity: 0.7;
    }

    /* =====================================================
       FRENTE DA CARTA: MODO PREMIUM (FUNDO ESCURO)
       ===================================================== */
    .premium-mode .printable-card.card-front-theme {
      background-color: var(--color-dark-card);
      border-color: rgba(255, 255, 255, 0.08);
    }

    .premium-mode .card-front-theme .card-front {
      background: radial-gradient(circle at top right, #0d1527 0%, #030712 100%);
    }

    .premium-mode .card-front-theme .card-header {
      border-bottom-color: rgba(255, 255, 255, 0.1);
    }

    .premium-mode .card-front-theme .logo-text {
      color: #fff;
    }

    .premium-mode .card-front-theme .card-id {
      color: var(--color-blue);
    }

    .premium-mode .card-front-theme .word-item {
      background: rgba(255, 255, 255, 0.03);
      color: #f3f4f6;
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-left: 4px solid #9ca3af;
    }

    .premium-mode .card-front-theme .word-item.border-blue {
      border-left-color: var(--color-blue);
      box-shadow: 0 0 10px rgba(0, 210, 255, 0.1);
    }

    .premium-mode .card-front-theme .word-item.border-yellow {
      border-left-color: var(--color-yellow);
      box-shadow: 0 0 10px rgba(255, 204, 0, 0.1);
    }

    /* =====================================================
       VERSO DA CARTA (DESIGN PREMIUM OBRIGATÓRIO)
       ===================================================== */
    .card-back {
      height: 100%;
      background: radial-gradient(circle at center, #0d1527 0%, #030712 100%) !important;
      color: #fff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 6mm;
      text-align: center;
      position: relative;
    }

    .back-logo {
      font-family: var(--font-display);
      font-size: 17px;
      font-weight: 800;
      color: var(--color-blue);
      letter-spacing: 2px;
      text-shadow: 0 0 12px rgba(0, 210, 255, 0.6);
    }

    .back-subtitle {
      font-size: 8px;
      color: var(--color-yellow);
      margin-top: 4px;
      letter-spacing: 3px;
      text-transform: uppercase;
      font-weight: bold;
      text-shadow: 0 0 8px rgba(255, 204, 0, 0.5);
    }

    .back-pattern {
      position: absolute;
      top: 4mm;
      left: 4mm;
      right: 4mm;
      bottom: 4mm;
      border: 1px solid rgba(0, 210, 255, 0.2);
      border-radius: 8px;
      pointer-events: none;
    }

    /* =====================================================
       IMPRESSÃO DE PÁGINAS (CONFIGURAÇÕES DO SISTEMA)
       ===================================================== */
    @media print {
      body {
        background-color: #ffffff !important;
        color: #000000 !important;
        padding: 0 !important;
        margin: 0 !important;
      }
      .no-print {
        display: none !important;
      }
      .page-a4 {
        box-shadow: none !important;
        page-break-after: always !important;
        margin: 0 !important;
      }
      .page-a4-label {
        display: none !important;
      }
    }
  </style>
</head>
<body>

  <!-- Painel de Controlo -->
  <div class="control-panel no-print">
    <div class="panel-row">
      <div class="panel-title">🎴 Impressão de Cartas Ka'Net</div>
      <button class="btn-print" onclick="window.print()">🖨️ Imprimir / Guardar em PDF</button>
    </div>
    <div class="panel-row">
      <div class="form-group">
        <label for="select-range">Intervalo de Cartas:</label>
        <select id="select-range" onchange="loadCards()">
          <option value="1-54">Cartas 1 a 54 (6 páginas)</option>
          <option value="55-108">Cartas 55 a 108 (6 páginas)</option>
          <option value="109-162">Cartas 109 a 162 (6 páginas)</option>
          <option value="163-216">Cartas 163 a 216 (6 páginas)</option>
          <option value="217-270">Cartas 217 a 270 (6 páginas)</option>
          <option value="271-360">Cartas 271 a 360 (10 páginas)</option>
          <option value="361-450">Cartas 361 a 450 (10 páginas)</option>
          <option value="451-570">Cartas 451 a 570 (13 páginas)</option>
        </select>
      </div>

      <div class="form-group">
        <label for="select-style">Estilo de Impressão (Frente):</label>
        <select id="select-style" onchange="toggleStyle()">
          <option value="premium">✨ Premium (Fundo Escuro Original)</option>
          <option value="light">🏠 Económico (Fundo Branco - Poupa Tinta)</option>
        </select>
      </div>
    </div>
    <p style="font-size: 11.5px; color: #9ca3af; text-align: center; line-height: 1.5;">
      💡 <strong>Como imprimir frente e verso:</strong> No menu de impressão do navegador, marque a caixa <strong>"Imprimir gráficos de fundo" (Background graphics)</strong>. Escolha <strong>Imprimir em ambos os lados</strong> virando na <strong>Borda Longa</strong>.
    </p>
  </div>

  <!-- Contentor das Páginas A4 -->
  <div class="print-pages-container premium-mode" id="pages-container">
    <p>A carregar base de dados de palavras...</p>
  </div>

  <script>
    let allCards = [];

    // Carregar o words.json
    fetch('words.json')
      .then(res => res.json())
      .then(data => {
        allCards = data;
        loadCards();
      })
      .catch(err => {
        console.error("Erro ao carregar words.json:", err);
        document.getElementById('pages-container').innerHTML = "<p style='color:red;'>Erro ao carregar o ficheiro words.json. Certifique-se de que está a correr no servidor.</p>";
      });

    function toggleStyle() {
      const style = document.getElementById('select-style').value;
      const container = document.getElementById('pages-container');
      if (style === 'premium') {
        container.classList.add('premium-mode');
      } else {
        container.classList.remove('premium-mode');
      }
    }

    function loadCards() {
      const range = document.getElementById('select-range').value;
      const parts = range.split('-');
      const startIdx = parseInt(parts[0]) - 1;
      const endIdx = parseInt(parts[1]) - 1;

      const selected = allCards.slice(startIdx, endIdx + 1);
      renderPrintLayout(selected, startIdx + 1);
    }

    function renderPrintLayout(cards, startId) {
      const container = document.getElementById('pages-container');
      container.innerHTML = '';

      const cardsPerPage = 9;
      const pagesCount = Math.ceil(cards.length / cardsPerPage);

      for (let p = 0; p < pagesCount; p++) {
        const pageCards = cards.slice(p * cardsPerPage, (p + 1) * cardsPerPage);
        
        // 1. Criar a Página de FRENTE
        const frontPage = document.createElement('div');
        frontPage.className = 'page-a4';
        
        const labelF = document.createElement('div');
        labelF.className = 'page-a4-label';
        labelF.innerText = `PÁGINA ${p * 2 + 1} (FRENTE) - Cartas ${startId + p * 9} a ${startId + p * 9 + pageCards.length - 1}`;
        frontPage.appendChild(labelF);

        pageCards.forEach((card) => {
          const cardEl = document.createElement('div');
          cardEl.className = 'printable-card card-front-theme';
          
          let wordsHtml = '';
          card.words.forEach((word, wIdx) => {
            // Alternar cores azul e amarelo da borda lateral
            const borderColorClass = (wIdx % 2 === 0) ? 'border-blue' : 'border-yellow';
            wordsHtml += `<li class="word-item ${borderColorClass}"><span class="word-num">${wIdx + 1}.</span> ${word}</li>`;
          });

          cardEl.innerHTML = `
            <div class="card-front">
              <div class="card-header">
                <span class="logo-text">KA'NET</span>
                <span class="card-id">#${card.id}</span>
              </div>
              <ul class="words-list">
                ${wordsHtml}
              </ul>
            </div>
          `;
          frontPage.appendChild(cardEl);
        });

        // Completar a página com placeholders vazios se houver menos de 9 cartas
        for (let i = pageCards.length; i < cardsPerPage; i++) {
          const empty = document.createElement('div');
          empty.className = 'printable-card';
          empty.style.border = '1px dashed #f0f0f0';
          frontPage.appendChild(empty);
        }

        container.appendChild(frontPage);

        // 2. Criar a Página de VERSO (com colunas espelhadas horizontalmente)
        const backPage = document.createElement('div');
        backPage.className = 'page-a4';
        
        const labelB = document.createElement('div');
        labelB.className = 'page-a4-label';
        labelB.innerText = `PÁGINA ${p * 2 + 2} (VERSO) - Versos correspondentes`;
        backPage.appendChild(labelB);

        // Espelhar colunas horizontalmente
        const mirroredCards = [];
        for (let row = 0; row < 3; row++) {
          const rowStart = row * 3;
          const card1 = pageCards[rowStart + 2];
          const card2 = pageCards[rowStart + 1];
          const card3 = pageCards[rowStart + 0];
          
          mirroredCards.push(card1);
          mirroredCards.push(card2);
          mirroredCards.push(card3);
        }

        mirroredCards.forEach((card) => {
          const cardEl = document.createElement('div');
          cardEl.className = 'printable-card';
          
          if (card) {
            cardEl.innerHTML = `
              <div class="card-back">
                <div class="back-pattern"></div>
                <div class="back-logo">KA'NET</div>
                <div class="back-subtitle">Equipas</div>
              </div>
            `;
          } else {
            cardEl.style.border = '1px dashed #f0f0f0';
          }
          backPage.appendChild(cardEl);
        });

        container.appendChild(backPage);
      }
      
      toggleStyle();
    }
  </script>
</body>
</html>
